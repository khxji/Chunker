name: Convert Minecraft World

on:
  workflow_dispatch: 
  push:
jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Download World from temp.sh
        # curl -L forces the runner to follow redirects to get the actual file
        run: curl -L "https://temp.sh/kDVGz/New_World_2.7z" -o save.7z

      - name: Extract 7z World
        # 'x' extracts with full paths
        # '-o' specifies output directory (must have no space after -o)
        # '-y' answers yes to all prompts
        run: 7z x save.7z -o./unzipped_save -y

      - name: Setup Node Environment
        uses: actions/setup-node@v4 
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install 

      - name: Run Conversion Tool
        # IMPORTANT: Make sure this command matches what your specific fork requires
        run: node index.js --input ./unzipped_save --output ./converted_save --target 1.20.1

      - name: Upload Converted World Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Downgraded-1.20.1-World
          path: ./converted_save
