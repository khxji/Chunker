name: Convert Minecraft World

on:
  # Allows you to manually trigger the workflow from the Actions tab on your phone
  workflow_dispatch: 
  push:

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Download World from temp.sh
        # wget bypasses the browser UI and downloads the raw file directly
        run: wget "https://temp.sh/kDVGz/New_World_2.7z" -O save.7z

      - name: Extract 7z World
        # 'x' extracts with full paths
        # '-o' specifies output directory (must have no space after -o)
        # '-y' answers yes to all prompts
        run: 7z x save.7z -o./unzipped_save -y

      - name: Setup Node Environment
        # Sets up Node.js for the conversion script to run
        uses: actions/setup-node@v4 
        with:
          node-version: '20'

      - name: Install Dependencies
        # Installs the required packages for the chunker/converter script
        run: npm install 

      - name: Run Conversion Tool
        # IMPORTANT: If your fork uses a different command to start the conversion, change this line!
        run: node index.js --input ./unzipped_save --output ./converted_save --target 1.20.1

      - name: Upload Converted World Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Downgraded-1.20.1-World
          # Uploads the final converted folder. GitHub Actions will zip it automatically.
          path: ./converted_save
          
